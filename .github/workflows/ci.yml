name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: contracts · forge test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge --version
      - name: Build
        run: forge build --sizes
      - name: Test
        run: forge test -vvv

  slither:
    name: contracts · slither
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Static analysis for a live-mainnet money contract: catches reentrancy /
      # access-control / arithmetic regressions on every PR. Config filters deps
      # (lib/), tests, scripts, and mocks so it focuses on src/. Gates on high-
      # severity findings; mediums are reported (see the run log) for triage.
      - name: Static analysis (Slither)
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: high

  web:
    name: web · build + embed
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build (standalone)
        run: npm run build
      - name: Build (web component embed)
        run: npm run build:embed
